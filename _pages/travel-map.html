<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
#travel-map {
    height: 650px;
    width: 100%;
    border-radius: 10px;
    margin-top: 20px;
    margin-bottom: 30px;
}

.leaflet-popup-content {
    width: 260px;
}

.popup-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
}

.popup-date {
    color: #777;
    font-size: 13px;
    margin-bottom: 10px;
}

.popup-img {
    width: 100%;
    border-radius: 6px;
    margin-bottom: 10px;
}

.popup-desc {
    font-size: 14px;
    line-height: 1.4;
}
</style>

<div id="travel-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload = function () {

    var map = L.map('travel-map').setView([20, 10], 2);

    console.log("Map created");

    L.tileLayer(
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    console.log("Tile layer added");

    L.marker([39.9526, -75.1652])
        .addTo(map)
        .bindPopup("Philadelphia");

};
</script>
