<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    /* Added !important and position:relative to fight theme overrides */
    #pilgrimage-map {
        width: 100% !important;
        height: 600px !important; 
        border-radius: 8px;
        z-index: 1;
        position: relative !important;
        display: block !important;
        background-color: #eee; /* Shows a gray box if tiles fail to load */
    }
    
    .popup-image {
        width: 100%;
        max-width: 250px;
        border-radius: 4px;
        margin-bottom: 8px;
    }
    .popup-title {
        font-size: 16px;
        font-weight: bold;
        margin: 0 0 5px 0;
    }
    .popup-desc {
        font-size: 14px;
        color: #444;
        margin: 0;
    }
</style>

<div id="pilgrimage-map" markdown="0"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

{% raw %}
<script>
    // Wait for the theme's DOM to fully load before touching the map
    document.addEventListener("DOMContentLoaded", function() {
        
        // Initialize the map, centered roughly on Tokyo
        const map = L.map('pilgrimage-map').setView([35.69, 139.70], 11);

        // Add the base map tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Function to create new pilgrimage locations
        function addLocation(lat, lng, title, anime, description, imageUrl) {
            const popupContent = `
                <div>
                    <img src="${imageUrl}" alt="${title}" class="popup-image" onerror="this.style.display='none'">
                    <h3 class="popup-title">${title}</h3>
                    <p class="popup-desc"><strong>Anime:</strong> ${anime}</p>
                    <p class="popup-desc">${description}</p>
                </div>
            `;

            L.marker([lat, lng])
             .addTo(map)
             .bindPopup(popupContent);
        }

        // Example 1: Steins;Gate
        addLocation(
            35.6979, 139.7719, 
            "Radio Kaikan", 
            "Steins;Gate", 
            "The iconic Akihabara building where the time machine crashed on the roof.", 
            "https://via.placeholder.com/250x150?text=Radio+Kaikan"
        );

        // Example 2: Your Lie in April
        addLocation(
            35.7388, 139.6535, 
            "Nerima Culture Center", 
            "Your Lie in April", 
            "The real-world location of Towa Hall where Kousei and Kaori performed.", 
            "https://via.placeholder.com/250x150?text=Towa+Hall"
        );
        
    });
</script>
{% endraw %}
