<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>
#travel-map {
    height: 650px;
    width: 100%;
    border-radius: 10px;
    margin-top: 20px;
    margin-bottom: 30px;
}

.leaflet-popup-content {
    width: 260px;
}

.popup-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
}

.popup-date {
    color: #777;
    font-size: 13px;
    margin-bottom: 10px;
}

.popup-img {
    width: 100%;
    border-radius: 6px;
    margin-bottom: 10px;
}

.popup-desc {
    font-size: 14px;
    line-height: 1.4;
}

.popup-gallery {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    margin-bottom: 10px;
}

.popup-gallery img {
    height: 160px;
    border-radius: 6px;
    flex-shrink: 0;
}
</style>

<div id="travel-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onload = function () {

    var map = L.map('travel-map').setView([20, 10], 2);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var trips = [
        {
            title: "Sensō-ji 浅草寺",
            date: "July 2025",
            lat: 35.71500898292457,
            lng: 139.79742777359257,
            images: [
                "/images/travel/japan/sensoji/001.jpeg",
                "/images/travel/japan/sensoji/002.jpeg",
                "/images/travel/japan/sensoji/003.jpeg",
                "/images/travel/japan/sensoji/004.jpeg",
                "/images/travel/japan/sensoji/005.jpeg",
                "/images/travel/japan/sensoji/006.jpeg"
            ],
            description: "Drew a Good Fortune (Kichi) omikuji at Sensō-ji, lucky! 😝"
        }
    ];

    trips.forEach(function(trip) {

        var imagesHTML =
            '<div class="popup-gallery">' +
            trip.images.map(function(img) {
                return '<img src="' + img + '">';
            }).join('') +
            '</div>';

        var popup =
            '<div class="popup-title">' + trip.title + '</div>' +
            '<div class="popup-date">' + trip.date + '</div>' +
            imagesHTML +
            '<div class="popup-desc">' + trip.description + '</div>';

        L.marker([trip.lat, trip.lng])
            .addTo(map)
            .bindPopup(popup);

        map.on("popupopen", function (e) {
            map.flyTo(
                e.popup.getLatLng(),
                16,
                {
                    animate: true,
                    duration: 1.5
                }
            );
        });

    });

};
</script>
