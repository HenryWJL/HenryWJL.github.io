{% raw %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    #pilgrimage-map {
        width: 100% !important;
        height: 600px !important; 
        border-radius: 8px;
        z-index: 1;
        position: relative !important;
        display: block !important;
        background-color: #eee;
    }
    
    .popup-image {
        width: 100%;
        max-width: 250px;
        border-radius: 4px;
        margin-bottom: 8px;
    }
    .popup-title {
        font-size: 16px;
        font-weight: bold;
        margin: 0 0 5px 0;
    }
    .popup-desc {
        font-size: 14px;
        color: #444;
        margin: 0;
    }
</style>

<div id="pilgrimage-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // Initialize the map
        const map = L.map('pilgrimage-map').setView([35.69, 139.70], 5);

        // Standard OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Force Leaflet to recalculate its size after 500ms to eliminate the gray box
        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        function addLocation(lat, lng, title, anime, description, imageUrl) {
            const popupContent = `
                <div>
                    <img src="${imageUrl}" alt="${title}" class="popup-image" onerror="this.style.display='none'">
                    <h3 class="popup-title">${title}</h3>
                    <p class="popup-desc"><strong>Anime:</strong> ${anime}</p>
                    <p class="popup-desc">${description}</p>
                </div>
            `;

            L.marker([lat, lng])
             .addTo(map)
             .bindPopup(popupContent);
        }

        // Steins;Gate Location
        addLocation(
            35.6979, 139.7719, 
            "Radio Kaikan", 
            "Steins;Gate", 
            "The iconic Akihabara building central to the events of the series.", 
            "https://via.placeholder.com/250x150?text=Radio+Kaikan"
        );

        // Your Lie in April Location
        addLocation(
            35.7388, 139.6535, 
            "Nerima Culture Center", 
            "Your Lie in April", 
            "The real-world inspiration for Towa Hall.", 
            "https://via.placeholder.com/250x150?text=Towa+Hall"
        );

        // Liz and the Blue Bird Location
        addLocation(
            34.8913, 135.8080, 
            "Uji Bridge", 
            "Liz and the Blue Bird", 
            "A scenic crossing heavily featured in the Kyoto Animation universe.", 
            "https://via.placeholder.com/250x150?text=Uji+Bridge"
        );
        
    });
</script>
{% endraw %}
